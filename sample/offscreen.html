<!DOCTYPE html>
<html>
<head>
    <title>Spector.js - OffscreenCanvas (Main Thread)</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: monospace; }
        #display { border: 1px solid #333; display: block; margin: 20px auto; }
        #controls { text-align: center; margin: 10px; }
        button { padding: 8px 16px; margin: 4px; cursor: pointer; background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; }
        button:hover { background: #0f3460; }
        #status { text-align: center; color: #e94560; min-height: 20px; margin: 10px; }
        h1 { text-align: center; font-size: 16px; color: #e94560; }
    </style>
</head>
<body>
    <h1>Spector.js — OffscreenCanvas (Main Thread) Demo</h1>
    <div id="controls">
        <button id="captureBtn">Capture Frame</button>
    </div>
    <div id="status"></div>
    <canvas id="display" width="800" height="600"></canvas>

    <script src="../dist/spector.bundle.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const displayCanvas = document.getElementById('display');
        const displayCtx = displayCanvas.getContext('2d');

        // Create an OffscreenCanvas (main thread, not transferred to Worker)
        const offscreen = new OffscreenCanvas(800, 600);
        const gl = offscreen.getContext('webgl2');

        if (!gl) {
            statusEl.textContent = 'WebGL2 not supported on OffscreenCanvas';
            throw new Error('No WebGL2');
        }

        statusEl.textContent = 'OffscreenCanvas created. WebGL2 context active. Ready to capture.';

        // Simple triangle shader program
        const vsSource = `#version 300 es
            in vec2 aPosition;
            in vec3 aColor;
            out vec3 vColor;
            uniform float uTime;
            void main() {
                float angle = uTime * 0.5;
                float c = cos(angle), s = sin(angle);
                vec2 pos = mat2(c, s, -s, c) * aPosition;
                gl_Position = vec4(pos, 0.0, 1.0);
                vColor = aColor;
            }
        `;
        const fsSource = `#version 300 es
            precision mediump float;
            in vec3 vColor;
            out vec4 fragColor;
            void main() {
                fragColor = vec4(vColor, 1.0);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vs = createShader(gl, gl.VERTEX_SHADER, vsSource);
        const fs = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }

        // Triangle vertices: position (x,y) + color (r,g,b) — interleaved, 20 bytes/vertex
        const vertices = new Float32Array([
             0.0,  0.6,   1, 0, 0,  // top — red
            -0.6, -0.4,   0, 1, 0,  // bottom-left — green
             0.6, -0.4,   0, 0, 1,  // bottom-right — blue
        ]);

        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);

        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const aPosition = gl.getAttribLocation(program, 'aPosition');
        gl.enableVertexAttribArray(aPosition);
        gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 20, 0);

        const aColor = gl.getAttribLocation(program, 'aColor');
        gl.enableVertexAttribArray(aColor);
        gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 20, 8);

        const uTime = gl.getUniformLocation(program, 'uTime');

        // Render loop
        const startTime = performance.now();
        function render() {
            const time = (performance.now() - startTime) / 1000;

            gl.viewport(0, 0, 800, 600);
            gl.clearColor(0.06, 0.06, 0.12, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.useProgram(program);
            gl.uniform1f(uTime, time);
            gl.bindVertexArray(vao);
            gl.drawArrays(gl.TRIANGLES, 0, 3);

            // Blit OffscreenCanvas to visible DOM canvas
            displayCtx.drawImage(offscreen, 0, 0);

            requestAnimationFrame(render);
        }
        render();

        // Spector.js capture
        const spector = new SPECTOR.Spector();

        document.getElementById('captureBtn').addEventListener('click', () => {
            statusEl.textContent = 'Capturing...';
            spector.onCapture.add((capture) => {
                statusEl.textContent = 'Capture complete! ' + capture.commands.length + ' commands recorded.';
                console.log('Capture result:', capture);

                // Display the Spector result UI
                spector.getResultUI().display();
                spector.getResultUI().addCapture(capture);
            });
            spector.onError.add((error) => {
                statusEl.textContent = 'Capture error: ' + error;
            });
            spector.captureCanvas(offscreen);
        });
    </script>
</body>
</html>
